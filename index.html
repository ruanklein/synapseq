<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SynapSeq - Playground</title>
    <meta
      name="description"
      content="Lightweight engine that sequences audio tones to guide brainwave states like relaxation, focus, and meditation using a simple text-based format."
    />

    <!-- Favicons -->
    <link rel="shortcut icon" href="assets/favicon.ico" />
    <meta name="msapplication-TileColor" content="#FFFFFF" />
    <meta
      name="msapplication-TileImage"
      content="assets/favicon-114-precomposed.png"
    />

    <!-- Scripts -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="wasm/synapseq.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Header -->
    <header>
      <div class="header-content">
        <a href="#" class="logo">
          <img
            src="assets/logo.png"
            alt="SynapSeq"
            style="width: 2rem; height: 2rem; border-radius: 50%"
          />
          <span class="logo-gradient">SynapSeq</span>
        </a>
        <nav class="nav-links">
          <a href="https://github.com/ruanklein/synapseq" target="_blank"
            >GitHub</a
          >
          <a
            href="https://github.com/ruanklein/synapseq/blob/main/docs/USAGE.md"
            target="_blank"
            >Docs</a
          >
          <a
            href="https://github.com/ruanklein/synapseq/blob/main/docs/FAQ.md"
            target="_blank"
            >FAQ</a
          >
          <a href="https://synapseq-hub.ruan.sh/" target="_blank">Hub</a>
          <button
            class="theme-toggle"
            id="themeToggle"
            aria-label="Toggle theme"
          >
            <i
              data-lucide="lightbulb"
              style="width: 1.25rem; height: 1.25rem"
            ></i>
          </button>
        </nav>
        <button class="hamburger" id="hamburger" aria-label="Toggle menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </header>

    <div class="header-spacer"></div>

    <main>
      <!-- Playground Section -->
      <section class="container">
        <div class="playground">
          <div class="playground-header">
            <div>
              <h2 class="playground-title">
                <i
                  data-lucide="audio-waveform"
                  style="width: 1.3rem; height: 1.3rem"
                ></i>
                Try it now
              </h2>
              <p class="hub-hint">
                Want more sequences?
                <a href="https://synapseq-hub.ruan.sh/" target="_blank"
                  >Visit our Hub!</a
                >
              </p>
            </div>
            <a
              href="https://github.com/ruanklein/synapseq/blob/main/docs/USAGE.md"
              target="_blank"
              class="docs-link"
            >
              <i data-lucide="book-open" style="width: 1rem; height: 1rem"></i>
              Documentation
            </a>
          </div>

          <div id="errorContainer" class="error-message"></div>

          <div id="editorContainer" class="editor-container">
            <div id="lineNumbers" class="line-numbers">1</div>
            <div class="editor-wrapper">
              <div id="syntaxHighlight" class="syntax-highlight"></div>
              <textarea
                id="spsqEditor"
                class="editor-textarea"
                rows="15"
                spellcheck="false"
                placeholder="# Try editing this example sequence!
# Presets
alpha
  noise pink amplitude 30
  tone 250 binaural 10 amplitude 15

# Timeline
00:00:00 silence
00:00:15 alpha
00:01:00 silence"
              >
# Presets
alpha
  noise pink amplitude 30
  tone 250 binaural 10 amplitude 15

# Timeline
00:00:00 silence
00:00:15 alpha
00:04:00 alpha
00:05:00 silence</textarea
              >
            </div>
          </div>

          <div class="controls">
            <button id="playBtn" class="btn btn-play" disabled>
              <i data-lucide="play" style="width: 1.25rem; height: 1.25rem"></i>
              Play
            </button>
            <button id="pauseBtn" class="btn btn-pause" disabled>
              <i
                data-lucide="pause"
                style="width: 1.25rem; height: 1.25rem"
              ></i>
              Pause
            </button>
            <button id="stopBtn" class="btn btn-stop" disabled>
              <i
                data-lucide="square"
                style="width: 1.25rem; height: 1.25rem"
              ></i>
              Stop
            </button>
            <button
              id="uploadBtn"
              class="btn btn-upload"
              onclick="document.getElementById('fileInput').click()"
            >
              <i
                data-lucide="upload"
                style="width: 1.25rem; height: 1.25rem"
              ></i>
              Upload
            </button>
            <input
              type="file"
              id="fileInput"
              class="file-input-hidden"
              accept=".spsq"
            />
          </div>

          <div class="progress-section">
            <div class="progress-bar-container">
              <div id="progressBar" class="progress-bar"></div>
            </div>
            <div id="timeDisplay" class="time-display">00:00 / 00:00</div>
          </div>

          <div id="statusMessage" class="status-message">Loading WASM...</div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer>
      <div class="container">
        <div class="footer-links">
          <a href="https://github.com/ruanklein/synapseq" target="_blank"
            >GitHub</a
          >
          <a
            href="https://github.com/ruanklein/synapseq/blob/main/docs/USAGE.md"
            target="_blank"
            >Documentation</a
          >
          <a
            href="https://github.com/ruanklein/synapseq/blob/main/docs/FAQ.md"
            target="_blank"
            >FAQ</a
          >
          <a href="https://synapseq-hub.ruan.sh/" target="_blank"
            >SynapSeq Hub</a
          >
        </div>
        <p style="margin-bottom: 10px">
          SynapSeq - Synapse-Sequenced Brainwave Generator
        </p>
        <p>&copy; 2025 <a href="https://ruan.sh" target="_blank">ruan.sh</a></p>
      </div>
    </footer>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
      <div class="loading-content">
        <i data-lucide="coffee" class="loading-icon"></i>
        <div class="loading-text">Generating audio...</div>
        <div class="loading-subtext">This may take a few moments</div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
